name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate temporary signing key
      run: |
        mkdir -p .sign
        keytool -genkeypair \
          -v \
          -keystore .sign/ci-release.jks \
          -storepass android \
          -keypass android \
          -alias ci-release \
          -keyalg RSA \
          -keysize 4096 \
          -validity 10000 \
          -dname "CN=DSU Sideloader Plus CI, OU=CI, O=yangFenTuoZi, L=CI, S=CI, C=CN"
        {
          echo "keystore=$GITHUB_WORKSPACE/.sign/ci-release.jks"
          echo "keystore_pw=android"
          echo "alias=ci-release"
          echo "alias_pw=android"
        } > .sign/dsu_sideloader.prop
      
    - name: Build with Gradle
      run: ./gradlew assembleRelease
      
    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: outputs-apk-release
        path: app/build/outputs/apk/release
